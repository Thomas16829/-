# =====================
# Clash Meta 真链式配置
# =====================

mixed-port: 7890

allow-lan: true

bind-address: "*"

mode: rule

log-level: info

tcp-concurrent: true

unified-delay: true


external-controller: 127.0.0.1:9090


profile:
  store-selected: true
  store-fake-ip: true



# =====================
# DNS
# =====================

dns:

  enable: true

  ipv6: false

  enhanced-mode: fake-ip


  nameserver:

    - 223.5.5.5
    - 119.29.29.29


  fallback:

    - 8.8.8.8
    - 1.1.1.1


  fallback-filter:

    geoip: true

    geoip-code: CN

# =====================
# 广告规则集
# =====================

rule-providers:

  reject:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt
    path: ./ruleset/reject.yaml
    interval: 86400


  anti-ad:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml
    path: ./ruleset/anti-ad.yaml
    interval: 86400



# =====================
# 订阅自动更新
