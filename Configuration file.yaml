  nodes:

    type: http


    url: "https://kjuobq.yau96.com/config?token=d0cff327fe324fc540b4acaa6592c477"


    path: ./proxy_providers/node.yaml


    interval: 2700


    health-check:


      enable: true


      url: https://www.gstatic.com/generate_204


      interval: 2700



