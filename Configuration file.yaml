# =====================
# 基础
# =====================

mixed-port: 7890

allow-lan: true

mode: rule

log-level: info

tcp-concurrent: true

unified-delay: true

find-process-mode: strict


external-controller: 127.0.0.1:9090



# =====================
# Profile
# =====================

profile:

  store-selected: true

  store-fake-ip: true



# =====================
# DNS
# 三端兼容
# =====================

dns:

  enable: true

  ipv6: false


  enhanced-mode: fake-ip


  fake-ip-range: 198.18.0.1/16


  fake-ip-filter:

    - "*.lan"

    - "*.local"

    - "localhost"

    - "time.*.com"

    - "*.ntp.org"



  default-nameserver:

    - 223.5.5.5

    - 119.29.29.29



  nameserver:

    - https://dns.alidns.com/dns-query

    - https://doh.pub/dns-query



  fallback:

    - https://dns.google/dns-query

    - https://cloudflare-dns.com/dns-query



  fallback-filter:

    geoip: true

    geoip-code: CN



# =====================
# Rule Provider
# =====================

rule-providers:


  reject:

    type: http

    behavior: domain

    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt

    path: ./ruleset/reject.yaml

    interval: 86400



  anti-ad:

    type: http

    behavior: domain

    url: https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml

    path: ./ruleset/anti-ad.yaml

    interval: 86400



# =====================
# Proxy Provider
# =====================

