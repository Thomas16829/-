mixed-port: 7890
allow-lan: true
bind-address: "*"

mode: rule
log-level: info

tcp-concurrent: true
unified-delay: true


profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: false

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  nameserver:
    - 223.5.5.5
    - 119.29.29.29

  fallback:
    - 8.8.8.8
    - 1.1.1.1

  fallback-filter:
    geoip: true
    geoip-code: CN



# =====================
# 广告规则集
# =====================

rule-providers:

  reject:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt
    path: ./ruleset/reject.yaml
    interval: 86400

  anti-ad:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml
    path: ./ruleset/anti-ad.yaml
    interval: 86400

