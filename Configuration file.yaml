mixed-port: 7890

allow-lan: true

bind-address: "*"

mode: rule

log-level: info

tcp-concurrent: true

unified-delay: true


external-controller: 127.0.0.1:9090



profile:

  store-selected: true

  store-fake-ip: true



# =====================
# DNS
# =====================

dns:

  enable: true

  ipv6: false

  enhanced-mode: fake-ip

  fake-ip-range: 198.18.0.1/16


  nameserver:

    - 223.5.5.5

    - 119.29.29.29


  fallback:

    - https://dns.google/dns-query

    - https://cloudflare-dns.com/dns-query


  fallback-filter:

    geoip: true

    geoip-code: CN




# =====================
# 规则集
# =====================

rule-providers:


  reject:

    type: http

    behavior: classical

    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt

    path: ./ruleset/reject.yaml

    interval: 86400



  anti-ad:

    type: http

    behavior: classical

    url: https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml

    path: ./ruleset/anti-ad.yaml

    interval: 86400




# =====================
# 自动订阅
# =====================

proxy-providers:


  节点订阅:

    type: http

    url: "https://raw.githubusercontent.com/Thomas16829/subscription.yaml/main/%E9%85%8D%E7%BD%AE%E6%96%87%E4%BB%B6.yaml.txt"

    path: ./proxy_providers/node.yaml

    interval: 900


    health-check:

      enable: true

      url: https://www.gstatic.com/generate_204

      interval: 300





# =====================
# 住宅IP
# =====================

proxies:


  - name: "美国住宅IP"

    type: socks5

    server: 207.145.156.49

    port: 33929

    username: 85c7cbbf10b4

    password: ec384d0f017f

    udp: true

    dialer-proxy: 自动中转






# =====================
# 代理组
# =====================

proxy-groups:


  - name: 自动中转

    type: url-test

    use:

      - 节点订阅


    url: https://www.gstatic.com/generate_204

    interval: 300

    tolerance: 50




  - name: 链式代理

    type: select

    proxies:

      - 自动中转

      - DIRECT




  - name: 住宅IP

    type: select

    proxies:

      - 美国住宅IP

      - 自动中转





# =====================
# 分流规则
# =====================

rules:



# 广告

  - RULE-SET,reject,REJECT

  - RULE-SET,anti-ad,REJECT



# 局域网

  - IP-CIDR,127.0.0.0/8,DIRECT

  - IP-CIDR,192.168.0.0/16,DIRECT

  - IP-CIDR,10.0.0.0/8,DIRECT

  - IP-CIDR,172.16.0.0/12,DIRECT



