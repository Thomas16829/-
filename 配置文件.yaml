mixed-port: 7890
allow-lan: true
bind-address: "*"

mode: rule
log-level: info

tcp-concurrent: true
unified-delay: true

external-controller: 127.0.0.1:9090


# =====================
# DNS
# =====================

dns:
  enable: true
  ipv6: false

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com

  nameserver:
    - 223.5.5.5
    - 119.29.29.29

  fallback:
    - 8.8.8.8
    - 1.1.1.1

  fallback-filter:
    geoip: true
    geoip-code: cn



